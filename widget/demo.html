<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embedded Widget Demo</title>
  <style>
    body {
      font-family: "Sora", sans-serif;
      margin: 0;
      padding: 40px;
      background: #f8fafc;
      color: #0f172a;
    }

    .card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 24px;
      max-width: 820px;
      margin-bottom: 20px;
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .actions button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: #1f8a70;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Widget Demo Page</h1>
    <p>Use the widget to ask where a feature is, then locate elements on this page.</p>
  </div>

  <div class="card">
    <h2 id="reports">Reports</h2>
    <p>Export and manage reports from this section.</p>
    <div class="actions">
      <button id="export-report-btn">Export Report</button>
      <button id="download-summary">Download Summary</button>
    </div>
  </div>

  <div class="card">
    <h2>Settings</h2>
    <p>Configure alert rules and notifications.</p>
    <div class="actions">
      <button id="alert-rule-btn">Create Alert Rule</button>
      <button id="notify-btn">Notification Center</button>
    </div>
  </div>

  <script>
    window.__SITE_NAV_CONFIG__ = {
      apiBase: "http://localhost:8080",
      kbName: "default-kb",
      topK: 6,
      title: "Feature Finder",
      subtitle: "Ask and locate on this page"
    };
  </script>
  <script src="./widget.js"></script>
</body>
</html>
